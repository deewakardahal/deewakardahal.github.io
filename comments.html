<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Comments – The Oracle of Delphi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav>
  <div class="nav-container">
    <!-- Hidden checkbox -->
    <input type="checkbox" id="menu-checkbox">

    <!-- Hamburger button -->
    <label for="menu-checkbox" class="menu-toggle">≡</label>

    <!-- Menu links -->
    <div class="nav-links" id="navLinks">
      <a href="../index.html">Home</a>
      <a href="../articles.html">Articles</a>
      <a href="../about.html">About</a>
      <a href="../comments.html">Comments</a>
    </div>
  </div>
</nav>

  <header>
    <h1 class="logo">THE ORACLE OF <span>DELPHI</span></h1>
    <p class="subtitle">— Feedback? —</p>
    <div class="gold-line"></div>
    <div class="divider"></div>
  </header>

  <main>
    <section>
      <h2>Comments & Reflections</h2>
      <form class="comments-form" id="commentForm">
        <input type="text" id="name" placeholder="Your Name" required>
        <input type="email" id="email" placeholder="Your Email" required>
        <textarea id="comment" rows="5" placeholder="Your thoughts..." required></textarea>
        <button type="submit">Post Comment</button>
      </form>

      <div class="comment-list" id="commentList"></div>
    </section>
  </main>

  <footer>
    © 2026 Deewakar Dahal – All thoughts are my own.
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
